<!DOCTYPE html>
<html lang="ja" style="background:#08060c">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pattern Architect — Total Massive v1.8</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap');
  :root{
    --bg:#08060c;--panel:#100d18;--border:#1e1a2a;--border2:#2e2840;
    --text:#d8d0e8;--muted:#6a5e80;--dim:#221e30;
    --accent:#ff8ad4;
    --mono:'DM Mono',monospace;--serif:'DM Serif Display',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 60px}
  
  header{text-align:center;margin-bottom:32px; width:100%; max-width:720px;}
  .eyebrow{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  h1{font-family:var(--serif);font-style:italic;font-size:clamp(28px,8vw,46px);color:#fff;font-weight:400;line-height:1.1;margin-bottom:4px}
  h1 span{color:var(--accent);transition:color .3s}
  .counter{font-size:10px;color:var(--dim);margin-top:8px;letter-spacing:.2em}

  .selector-group{width:100%;max-width:720px;margin-bottom:12px}
  .selector-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .selector{display:flex;gap:8px;width:100%;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
  .selector::-webkit-scrollbar{display:none;}
  .selector-btn{flex:0 0 auto;min-width:130px;padding:11px 15px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .2s}
  .selector-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(255,138,212,0.03)}

  .card{width:100%;max-width:720px;background:var(--panel);border:1px solid var(--border);padding:32px;margin-bottom:20px;min-height:550px;display:flex;flex-direction:column;border-radius:4px;}
  .fields{display:flex;flex-direction:column;gap:0;flex-grow:1}
  .field-row{display:grid;grid-template-columns:100px 1fr auto;gap:12px;align-items:start;padding:12px 0;border-bottom:1px solid var(--border);min-height:45px}
  .field-row:last-child{border-bottom:none}
  .field-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);padding-top:6px}
  .field-value{font-family:var(--serif);font-style:italic;font-size:17px;line-height:1.4;color:#f1ecf7}
  
  .reroll-btn{background:transparent;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 6px;transition:all .15s;opacity:0.3}
  .reroll-btn:hover{color:var(--accent);transform:rotate(-15deg);opacity:1}

  .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
  .prompt-textarea{width:100%;background:#080a0c;border:1px solid var(--border2);color:var(--muted);font-family:var(--mono);font-size:11px;line-height:1.8;padding:14px;resize:none;min-height:130px;margin-bottom:14px;word-break:break-word;outline:none;border-radius:4px;}

  .action-bar{display:flex;gap:10px;justify-content:flex-end}
  .copy-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:10px 18px;font-size:10px;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;font-family:var(--mono);transition:all .2s;border-radius:2px}
  .copy-btn:hover{border-color:var(--accent);color:var(--accent)}

  .generate-btn{width:100%;max-width:720px;background:var(--accent);color:#000;font-weight:700;border:none;padding:22px;font-size:13px;letter-spacing:.4em;text-transform:uppercase;cursor:pointer;font-family:var(--mono);transition:all .2s;margin-bottom:40px;border-radius:4px}
  .generate-btn:active{transform:translateY(1px);filter:brightness(0.9)}
  
  footer{margin-top:20px;font-size:9px;color:var(--dim);letter-spacing:.2em;text-align:center}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .animate-in{animation:fadeIn .4s ease-out forwards}
</style>
</head>
<body>

<header>
  <div class="eyebrow">Studio Architect / v1.8 Total Massive</div>
  <h1 id="mainTitle">Surface <span>Architect</span></h1>
  <div class="counter" id="count">0000 GENERATED</div>
</header>

<div class="selector-group">
  <div class="selector-label">Design Universe</div>
  <div class="selector" id="styleSelector">
    <button class="selector-btn active" data-style="kawaii">Kawaii Massive</button>
    <button class="selector-btn" data-style="geometric">Geometric Massive</button>
    <button class="selector-btn" data-style="pop">Pop Art Massive</button>
    <button class="selector-btn" data-style="minimal">Minimal Massive</button>
  </div>
</div>

<div class="card">
  <div id="displayFields" class="fields">
    <div class="field-row"><div class="field-label">Motif</div><div class="field-value" id="v-motif">---</div><button class="reroll-btn" onclick="reroll('motif')">🔄</button></div>
    <div class="field-row"><div class="field-label">Structure</div><div class="field-value" id="v-structure">---</div><button class="reroll-btn" onclick="reroll('structure')">🔄</button></div>
    <div class="field-row"><div class="field-label">Palette</div><div class="field-value" id="v-palette">---</div><button class="reroll-btn" onclick="reroll('palette')">🔄</button></div>
    <div class="field-row"><div class="field-label">Vibe</div><div class="field-value" id="v-vibe">---</div><button class="reroll-btn" onclick="reroll('vibe')">🔄</button></div>
    <div class="field-row"><div class="field-label">Details</div><div class="field-value" id="v-details">---</div><button class="reroll-btn" onclick="reroll('details')">🔄</button></div>
    <div class="field-row"><div class="field-label">Material</div><div class="field-value" id="v-medium">---</div><button class="reroll-btn" onclick="reroll('medium')">🔄</button></div>
  </div>
  
  <hr class="divider">
  <textarea class="prompt-textarea" id="prompt" readonly placeholder="Awaiting system instructions..."></textarea>
  <div class="action-bar">
    <button class="copy-btn" id="copyBtn">Copy Architecture</button>
  </div>
</div>

<button class="generate-btn" id="generateBtn">GENERATE TOTAL MASSIVE</button>

<footer>&copy; 2026 Studio Architect // Complete Surface Design System</footer>

  },

    motif: ["bold halftone dots", "y2k bling star shapes", "retro arcade pixel patterns", "vibrant sticker-style fragments", "bubblegum abstract squiggles", "comic book explosion bursts", "street graffiti texture fragments", "soup can silhouettes", "abstract halftone lips", "dollar sign fragments", "retro telephone icons", "pixelated cherry icons", "bold thunderbolt shapes", "checkered race patterns", "pop art banana shapes", "retro sunglasses outlines", "comic-style speech bubbles", "stencil-style faces (no identity)", "urban flyer fragments", "spray paint splatters"],

    details: ["thick black ink outlines", "ben-day comic dots", "glossy plastic highlights", "chromatic aberration", "distressed paper texture", "onomatopoeia text graphics", "halftone gradient fades", "screen print misalignments", "spray paint drips", "stencil spray texture", "marker pen outlines", "newsprint texture grain", "sticker peel effects", "ink bleed edges", "high-gloss varnish", "digital glitch artifacts", "bold drop shadows", "fluorescent glow", "retro scanline effect", "torn paper edges"],
    medium: ["pop art illustration", "vintage comic print", "risograph texture", "vector sticker art", "screen print style", "stencil street art", "zine-style collage", "marker drawing style", "retro-future digital art", "silk-screen aesthetic", "pixel art pop", "acrylic pop painting", "digital airbrush style", "mixed media pop", "comic-book ink art", "poster design style", "street art graffiti", "bold vector graphic", "vintage commercial art", "modern pop aesthetic"]

    structure: ["sparse open layout", "uniform micro-grid", "seamless subtle tiling", "asymmetric negative space", "perfectly balanced emptiness", "golden ratio alignment", "central focal point", "single horizon line", "rhythmic breathing space", "staggered sparse elements", "minimalist linear flow", "centered zen symmetry", "layered sheer transparency", "floating microscopic grid", "perfectly ordered silence", "random but sparse drift", "strictly aligned margins", "subtle organic clustering", "diagonal fine lines", "asymmetrical white space"],

    details: ["ultra-fine thin lines", "matte paper texture", "soft-focus blurred edges", "perfect negative space", "subtle depth and shadow", "microscopic grain texture", "fine graphite dust", "soft watercolor wash", "perfectly sharp edges", "ink bleed (minimal)", "subtle fabric weave", "soft gradient transition", "delicate pencil marks", "clean paper emboss", "natural texture noise", "subtle light shadow", "micro-stitched details", "hand-drawn fine ink", "translucent layers", "minimalist line weight"],

const CONFIG = {
  kawaii: { accent: '#ff8ad4', label: 'Kawaii Massive' },
  geometric: { accent: '#38bdf8', label: 'Geometric Massive' },
  pop: { accent: '#fbbf24', label: 'Pop Massive' },
  minimal: { accent: '#94a3b8', label: 'Minimal Massive' }
};

let selectedStyle = 'kawaii';
let current = {};
let count = parseInt(localStorage.getItem('arch_count_v18') || '0', 10);

const $ = id => document.getElementById(id);
const rand = arr => arr[Math.floor(Math.random()*arr.length)];

function updateCount() {
  $('count').textContent = count.toString().padStart(4, '0') + " GENERATED";
  localStorage.setItem('arch_count_v18', count);
}

function setStyle(key) {
  selectedStyle = key;
  const config = CONFIG[key];
  document.documentElement.style.setProperty('--accent', config.accent);
  document.querySelectorAll('.selector-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.style === key);
  });
  $('mainTitle').querySelector('span').textContent = config.label;
}

function renderFields() {
  if(!current.motif) return;
  const accent = CONFIG[selectedStyle].accent;
  const fields = ['motif', 'structure', 'palette', 'vibe', 'details', 'medium'];
  
  fields.forEach(f => {
    const el = $(`v-${f}`);
    el.textContent = current[f];
    el.style.color = (f === 'motif' || f === 'palette') ? accent : "var(--text)";
    el.closest('.field-row').classList.remove('animate-in');
    void el.offsetWidth;
    el.closest('.field-row').classList.add('animate-in');
  });

  const p = `${current.motif}, ${current.structure}, color palette: ${current.palette}, ${current.details}, vibe: ${current.vibe}, ${current.medium}, seamless repeating pattern, high quality surface design, NO characters, NO humans, NO faces, NO toys, NO real products, 8k resolution`;
  $('prompt').value = p;
}

function generate() {
  const d = DATA[selectedStyle];
  current = {
    motif: rand(d.motif), structure: rand(d.structure), palette: rand(d.palette),
    vibe: rand(d.vibe), details: rand(d.details), medium: rand(d.medium)
  };
  count++;
  updateCount();
  renderFields();
}

function reroll(field) {
  if(!current.motif) return;
  current[field] = rand(DATA[selectedStyle][field]);
  renderFields();
}

document.querySelectorAll('.selector-btn').forEach(btn => {
  btn.onclick = () => setStyle(btn.dataset.style);
});

$('generateBtn').onclick = generate;
$('copyBtn').onclick = async () => {
  const t = $('prompt').value;
  if(!t) return;
  await navigator.clipboard.writeText(t);
  $('copyBtn').textContent = "COPIED";
  setTimeout(() => $('copyBtn').textContent = "COPY ARCHITECTURE", 1000);
};

updateCount();
setStyle('kawaii');
</script>
</body>
</html>
